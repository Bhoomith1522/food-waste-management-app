type FoodItem @model
@auth(rules: [
  { allow: public, operations: [read] },
  { allow: private, operations: [create, update, delete] }
]) {
  id: ID!
  title: String
  hotel: String
  type: String
  expiryTime: AWSDateTime
  claimed: Boolean
  image: String
  hotelPhone: String
  hotelAddress: String
  hotelMapLink: String
  animalFood: Boolean
}